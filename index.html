<!doctype html>
<html lang="ms">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Video Gallery</title>
<style>
body{font-family:system-ui;margin:0;background:#0f1115;color:#e9eef7}
header{padding:16px;border-bottom:1px solid #202533;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input,select{background:#141824;border:1px solid #2a3246;color:#fff;padding:8px;border-radius:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:18px}
.card{background:#141824;border:1px solid #202533;border-radius:12px;overflow:hidden;cursor:pointer}
.thumb{aspect-ratio:16/9}
.thumb img{width:100%;height:100%;object-fit:cover}
.meta{padding:10px}
.title{font-weight:700;font-size:14px}
.pill{font-size:11px;border:1px solid #2a3246;padding:3px 8px;border-radius:999px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.modal.on{display:flex}
.modalBox{background:#111;border-radius:12px;max-width:900px;width:95%}
.player{aspect-ratio:16/9}
iframe{width:100%;height:100%;border:0}
</style>
</head>
<body>

<header>
<b>📺 Video Gallery</b>
<input id="q" placeholder="Search...">
<select id="cat"><option value="">All</option></select>
<a href="./admin.html" style="color:#fff;text-decoration:none">Admin</a>
</header>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
<div class="modalBox">
<div class="player"><iframe id="frame" allowfullscreen></iframe></div>
</div>
</div>

<script>
const grid = document.getElementById("grid");
const q = document.getElementById("q");
const cat = document.getElementById("cat");
const modal = document.getElementById("modal");
const frame = document.getElementById("frame");

function ytId(url){
  try{
    const u = new URL(url);
    if(u.hostname.includes("youtu.be")) return u.pathname.replace("/","");
    if(u.searchParams.get("v")) return u.searchParams.get("v");
  }catch(e){}
  return "";
}
function thumb(url){ return "https://i.ytimg.com/vi/"+ytId(url)+"/hqdefault.jpg"; }
function embed(url){ return "https://www.youtube.com/embed/"+ytId(url); }

let all = [];

function render(){
  const keyword = q.value.toLowerCase();
  const c = cat.value;

  const list = all.filter(v=>{
    if(!v.isPublished) return false;
    if(c && v.category!==c) return false;
    if(!keyword) return true;
    return (v.title+" "+(v.tags||[])).toLowerCase().includes(keyword);
  });

  grid.innerHTML = list.map(v=>`
    <div class="card" onclick="openVideo('${v.youtubeUrl}')">
      <div class="thumb"><img src="${thumb(v.youtubeUrl)}"></div>
      <div class="meta">
        <div class="title">${v.title}</div>
        <div class="pill">${v.category||""}</div>
      </div>
    </div>
  `).join("");
}

function openVideo(url){
  frame.src = embed(url);
  modal.classList.add("on");
}
modal.onclick = ()=>{ modal.classList.remove("on"); frame.src=""; };

async function init(){
  try{
    const res = await fetch("./videos.json",{cache:"no-store"});
    const data = await res.json();
    all = Array.isArray(data) ? data : (data.videos||[]);
    const cats = [...new Set(all.map(v=>v.category).filter(Boolean))];
    cat.innerHTML = `<option value="">All</option>`+cats.map(c=>`<option>${c}</option>`).join("");
    render();
  }catch(e){
    document.body.innerHTML = "<h2 style='color:red'>Failed to load videos.json</h2>";
  }
}

q.oninput = render;
cat.onchange = render;

init();
</script>
</body>
</html>
